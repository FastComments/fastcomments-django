name: Tests

# Runs on PRs and pushes to the default branch. We use `pull_request` (never
# `pull_request_target`), so no secrets are exposed to forks. The test suite
# needs no credentials: SSO signing is verified with a literal test secret.
on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
        django-version: ["4.2", "5.0", "5.1", "5.2"]
        exclude:
          # Django 5.x requires Python >= 3.10.
          - python-version: "3.8"
            django-version: "5.0"
          - python-version: "3.9"
            django-version: "5.0"
          - python-version: "3.8"
            django-version: "5.1"
          - python-version: "3.9"
            django-version: "5.1"
          - python-version: "3.8"
            django-version: "5.2"
          - python-version: "3.9"
            django-version: "5.2"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Pin Django to the matrix version (overrides the >=4.2 floor).
          pip install "Django~=${{ matrix.django-version }}.0"
      - name: Run tests
        run: pytest tests/ -v
